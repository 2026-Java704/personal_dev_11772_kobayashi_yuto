<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>タスク更新</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
	<h1>タスク更新</h1>
	
	<form th:action="@{/tasks/{taskId}/edit(taskId=${task.id})}" method="post">
		<table border="1">
			<tr>
				<th>カテゴリー</th>
				<td>
					<input type ="text" name="categoryId"th:value="${task.category.id}">
				</td>
			</tr>
			
			<tr>
				<th>タイトル</th>
				<td>
					<input type ="text" name="title"th:value="${task.title}">
				</td>
			</tr>
			
			<tr>
				<th>期限</th>
				<td>
					<input type ="date" name="closing_date"th:value="${task.closing_date}">
				</td>
			</tr>
			
			<tr>
				<th>進捗状況</th>
				<td>
					<input type ="text" name="progress"th:value="${task.progress}">
					
				</td>
			</tr>
			
			<tr>
				<th>メモ</th>
				<td>
					<input type ="text" name="memo"th:value="${task.memo}">
				</td>
			</tr>
		</table>
		

		<button>更新</button>
	</form>
</body>
</html>
