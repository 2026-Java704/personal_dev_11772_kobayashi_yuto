<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>タスク登録</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
	<h1>タスク登録</h1>
	
	<form action="/tasks/add" method="post">
		<table border ="1">
			<ul th:if="${errorList}" class="error">
				<li th:each="error:${errorList}" th:text="${error}"></li>
			</ul>
			<tr>
				<th>カテゴリー</th>
				<td>
					<input type ="radio" name="categoryId" th:value ="1">運動<a>
					<input type ="radio" name="categoryId" th:value="2">勉強</a>
					<input type ="radio" name="categoryId" th:value ="3">仕事<a>
					<input type ="radio" name="categoryId" th:value ="4">その他<a>
				</td>
			</tr>
			
			<tr>
				<th>タイトル</th>
				<td>
					<textarea name="title" cols="30" rows="2"></textarea>
				</td>
			</tr>
			
			<tr>
				<th>期限</th>
				<td>
					<input type="date" name="closing_date">
				</td>
			</tr>
			
			<tr>
				<th>進捗状況</th>
			<td>
				<input type ="radio" name="progress"value ="0">未着手<a>
				<input type ="radio" name="progress"value ="1">進行中<a>
			</td>
			</tr>
			
			<tr>
			<th>メモ</th>
			<td>
			<textarea name="memo" cols="30" rows="4"></textarea>
			</td>
			</tr>
		</table>
		<button>登録</button>
	</form>
	
</body>
</html>
